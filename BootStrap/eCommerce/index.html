<!DOCTYPE html>
<html>
<head>
    <title>E-Commerce Page</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

    <h2 class="text-center mb-4">Product List</h2>

    <!-- Dropdown -->
    <select class="form-select mb-4 w-25" onchange="filterProducts(this.value)">
        <option value="all">All</option>
        <option value="electronics">Electronics</option>
        <option value="fashion">Fashion</option>
    </select>

    <!-- Product Grid -->
    <div class="row">

        <!-- Product 1 -->
        <div class="col-md-4 mb-4 product" data-category="electronics">
            <div class="card">
                <img src="https://via.placeholder.com/200" class="card-img-top">
                <div class="card-body text-center">
                    <h5>Phone</h5>
                    <p>$500</p>
                    <button class="btn btn-primary">Buy</button>
                </div>
            </div>
        </div>

        <!-- Product 2 -->
        <div class="col-md-4 mb-4 product" data-category="fashion">
            <div class="card">
                <img src="https://via.placeholder.com/200" class="card-img-top">
                <div class="card-body text-center">
                    <h5>T-Shirt</h5>
                    <p>$20</p>
                    <button class="btn btn-primary">Buy</button>
                </div>
            </div>
        </div>

        <!-- Product 3 -->
        <div class="col-md-4 mb-4 product" data-category="electronics">
            <div class="card">
                <img src="https://via.placeholder.com/200" class="card-img-top">
                <div class="card-body text-center">
                    <h5>Laptop</h5>
                    <p>$900</p>
                    <button class="btn btn-primary">Buy</button>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- JavaScript -->
<script>
function filterProducts(category) {
    let items = document.querySelectorAll('.product');

    items.forEach(item => {
        if (category === "all" || item.dataset.category === category) {
            item.style.display = "block";
        } else {
            item.style.display = "none";
        }
    });
}
</script>

</body>
</html>
