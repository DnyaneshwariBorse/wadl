<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="fb_style.css">
    <title>Facebook - Log In or Sign Up</title>
</head>

<body>
    <header class="navbar">
        <div class="logo">facebook</div>
        <div class="login-form">
            <div class="field-group">
                <label>Email or Username</label>
                <input type="text">
                <label><input type="checkbox"> Keep me logged in</label>
            </div>
            <div class="field-group">
                <label>Password</label>
                <input type="password">
                <a href="#">Forgotten my password!</a>
            </div>
            <button class="login-btn">login</button>
        </div>
    </header>

    <main class="content">
        <section class="left-side">
            <h2>Facebook is useless without friends.<br>Make More Friends.</h2>
            <div class="map-box">
                <p>Facebook helps you connect and share...</p>
                <img src="https://via.placeholder.com/350x180" alt="World Map Illustration">
            </div>
        </section>

        <section class="right-side">
            <h1>Create an Account</h1>
            <p>It's free and always will be.</p>
            <div class="name-row">
                <input type="text" placeholder="Firstname">
                <input type="text" placeholder="Lastname">
            </div>
            <input type="text" placeholder="Email" class="full-input">
            <input type="text" placeholder="Re-enter email" class="full-input">
            <input type="password" placeholder="Password" class="full-input">
            <input type="date" class="full-input">

            <div class="gender-row">
                <input type="radio" name="g"> Male
                <input type="radio" name="g"> Female
            </div>

            <p class="terms">By clicking create an account, you agree to our Terms.</p>
            <button class="signup-btn">Signup</button>
            <p><a href="#">Create a page</a> for you.</p>
        </section>
    </main>
</body>

</html>
