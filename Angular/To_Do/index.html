<!DOCTYPE html>
<html lang="en" ng-app="todoApp">
<head>
  <meta charset="UTF-8">
  <title>Angular To-Do List</title>
  <!-- Load AngularJS via CDN -->
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #74ebd5, #9face6); min-height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; padding: 20px; }
    .container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); }
    h2 { text-align: center; color: #2c3e50; margin-bottom: 20px; }
    .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
    input[type="text"] { flex: 1; padding: 10px; border: 1px solid #bdc3c7; border-radius: 6px; }
    button { padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; color: white; background-color: #3498db; }
    button:hover { opacity: 0.9; }
    .edit-btn { background-color: #f39c12; }
    .delete-btn { background-color: #e74c3c; }
    ul { list-style: none; padding: 0; margin: 0; }
    li { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #ddd; }
    li:last-child { border-bottom: none; }
    .actions { display: flex; gap: 5px; }
  </style>
</head>
<body ng-controller="todoController">

<div class="container">
  <h2>Angular To-Do List</h2>

  <!-- Add/Edit Task -->
  <div class="input-group">
    <input type="text" ng-model="taskInput" placeholder="Enter a task to do...">
    <button ng-click="saveTask()" ng-style="{'background-color': isEditing ? '#2ecc71' : '#3498db'}">
      {{ isEditing ? 'Update' : 'Add' }}
    </button>
  </div>

  <!-- Task List -->
  <ul>
    <li ng-repeat="task in tasks">
      <span>{{ task }}</span>
      <div class="actions">
        <button class="edit-btn" ng-click="editTask($index)">Edit</button>
        <button class="delete-btn" ng-click="deleteTask($index)">Delete</button>
      </div>
    </li>
  </ul>
</div>

<script>
  var app = angular.module('todoApp', []);
  app.controller('todoController', function($scope) {
    // Initial tasks
    $scope.tasks = ['Learn Angular Directives', 'Understand Two-Way Binding', 'Build CRUD App'];
    $scope.isEditing = false;
    $scope.editIndex = -1;

    // Add or Update Task
    $scope.saveTask = function() {
      if (!$scope.taskInput || $scope.taskInput.trim() === '') return;
      
      if ($scope.isEditing) {
        $scope.tasks[$scope.editIndex] = $scope.taskInput;
        $scope.isEditing = false;
        $scope.editIndex = -1;
      } else {
        $scope.tasks.push($scope.taskInput);
      }
      $scope.taskInput = ''; // Clear input
    };

    // Edit Task
    $scope.editTask = function(index) {
      $scope.taskInput = $scope.tasks[index];
      $scope.isEditing = true;
      $scope.editIndex = index;
    };

    // Delete Task
    $scope.deleteTask = function(index) {
      $scope.tasks.splice(index, 1);
    };
  });
</script>

</body>
</html>
