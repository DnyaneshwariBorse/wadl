<div class="container mt-5" style="max-width: 500px;">
  <h1 class="text-center mb-4">📝 To-Do List</h1>
  <div class="input-group mb-3">
    <input [(ngModel)]="newTask" type="text" class="form-control" placeholder="Enter your task" />
    <button class="btn btn-primary" (click)="editIndex === null ? addTask() : updateTask()" >
      {{ editIndex === null ? 'Add' : 'Update' }}
    </button>
  </div>
  <ul class="list-group">
    <li class="list-group-item d-flex justify-content-between align-items-center" *ngFor="let task of tasks; index as i" >
      {{ task }}
      <div>
        <button class="btn btn-sm btn-warning me-2" (click)="editTask(i)">Edit</button>
        <button class="btn btn-sm btn-danger" (click)="deleteTask(i)">Delete</button>
      </div>
    </li>
  </ul>
</div>
