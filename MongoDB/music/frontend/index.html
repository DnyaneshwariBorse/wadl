<!DOCTYPE html>
<html>
<head>
    <title>Music App</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background-color: #f4f4f9; 
            color: #333; 
            max-width: 900px; 
            margin: 0 auto; 
            padding: 10px; 
            font-size: 14px;
        }
        h1 { 
            text-align: center; 
            color: #2c3e50; 
            border-bottom: 2px solid #3498db;
            padding-bottom: 5px;
            font-size: 22px;
            margin: 5px 0 15px 0;
        }
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .card {
            background: white;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        h2 { 
            background-color: #e8eaed; 
            padding: 5px 8px; 
            border-left: 4px solid #3498db; 
            font-size: 15px; 
            margin: 0 0 10px 0; 
        }
        input { 
            width: 100%; 
            padding: 6px; 
            margin: 0 0 8px 0; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
            box-sizing: border-box;
            font-size: 13px;
        }
        button { 
            background-color: #3498db; 
            color: white; 
            padding: 8px; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            width: 100%;
            font-weight: bold;
            font-size: 13px;
        }
        button:hover { 
            background-color: #2980b9; 
        }
        a { 
            display: block;
            background-color: #2ecc71;
            color: white;
            padding: 8px;
            text-decoration: none;
            border-radius: 4px;
            text-align: center;
            margin-bottom: 6px;
            font-weight: bold;
        }
        a:hover { 
            background-color: #27ae60; 
        }
    </style>
</head>
<body>
    <h1>🎵 Music App Dashboard</h1>
    
    <div class="grid-container">
        
        <div class="card">
            <h2>1. Quick Actions</h2>
            <a href="/insert" target="_blank">Insert Default Songs</a>
            <a href="/table" target="_blank" style="background-color:#9b59b6;">View Songs (Table Format)</a>
            <a href="/songs" target="_blank" style="background-color:#f39c12;">View Songs (JSON Format)</a>
        </div>
        
        <div class="card">
            <h2>2. Add New Song</h2>
            <form action="/add" method="GET" target="_blank">
                <input type="text" name="songname" placeholder="Song Name" required>
                <input type="text" name="film" placeholder="Film Name" required>
                <input type="text" name="director" placeholder="Music Director" required>
                <input type="text" name="singer" placeholder="Singer Name" required>
                <button type="submit">Add Song</button>
            </form>
        </div>
        
        <div class="card">
            <h2>3. Search/Filter Songs</h2>
            <form action="/filter" method="GET" target="_blank" style="margin-bottom:10px;">
                <input type="text" name="director" placeholder="Director Name">
                <input type="text" name="singer" placeholder="Singer Name">
                <button type="submit">Filter by Director & Singer</button>
            </form>
            <form action="/film-singer" method="GET" target="_blank">
                <input type="text" name="film" placeholder="Film Name">
                <input type="text" name="singer" placeholder="Singer Name">
                <button type="submit">Filter by Film & Singer</button>
            </form>
        </div>

        <div class="card">
            <h2>4. Modify Existing Songs</h2>
            <form id="update-form" onsubmit="event.preventDefault(); window.open('/update/' + document.getElementById('update-name').value, '_blank');" style="margin-bottom:15px;">
                <input type="text" id="update-name" placeholder="Enter Song Name to Update" required>
                <button type="submit">Update Song (Adds Cast)</button>
            </form>
            
            <form id="delete-form" onsubmit="event.preventDefault(); window.open('/delete/' + document.getElementById('delete-name').value, '_blank');">
                <input type="text" id="delete-name" placeholder="Enter Song Name to Delete" required>
                <button type="submit" style="background-color:#e74c3c;">Delete Song</button>
            </form>
        </div>

    </div>
</body>
</html>
